<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝星航空 | BlueStar Airlines - 模拟飞行连飞</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --secondary: #0066ff;
            --accent: #7b2fff;
            --dark: #0a0e27;
            --darker: #050817;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--darker);
            color: #fff;
            overflow-x: hidden;
        }

        /* ===== 星空粒子背景 ===== */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== 导航栏 ===== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: rgba(5, 8, 23, 0.7);
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        nav.scrolled {
            padding: 0.6rem 3rem;
            background: rgba(5, 8, 23, 0.95);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            position: relative;
        }

        .logo-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .logo-sub {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            position: relative;
            transition: color 0.3s;
            font-weight: 300;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            padding: 10px 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 30px;
            color: var(--darker);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
        }

        /* ===== Hero Section ===== */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            overflow: hidden;
        }

        .hero-bg-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .hero-content {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            font-size: 0.8rem;
            color: var(--primary);
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            animation: fadeInDown 1s ease;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 7vw, 5.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .hero h1 .gradient-text {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }

        .hero p {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.6);
            max-width: 600px;
            margin: 0 auto 3rem;
            line-height: 1.8;
            font-weight: 300;
            animation: fadeInUp 1s ease 0.4s both;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .btn-primary {
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 50px;
            color: var(--darker);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.5);
        }

        .btn-secondary {
            padding: 16px 40px;
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: #fff;
            font-weight: 400;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            backdrop-filter: blur(10px);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-3px);
        }

        /* 飞机动画 */
        .hero-plane {
            position: absolute;
            font-size: 3rem;
            animation: flyAcross 8s linear infinite;
            opacity: 0.15;
            z-index: 0;
        }

        @keyframes flyAcross {
            0% { transform: translateX(-100vw) translateY(0) rotate(-5deg); }
            50% { transform: translateX(0) translateY(-30px) rotate(0deg); }
            100% { transform: translateX(100vw) translateY(0) rotate(5deg); }
        }

        /* 滚动指示器 */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            animation: fadeInUp 1s ease 1s both;
        }

        .scroll-indicator span {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--primary), transparent);
            animation: scrollPulse 2s ease infinite;
        }

        @keyframes scrollPulse {
            0% { opacity: 0; transform: scaleY(0); transform-origin: top; }
            50% { opacity: 1; transform: scaleY(1); }
            100% { opacity: 0; transform: scaleY(0); transform-origin: bottom; }
        }

        /* ===== 数据统计条 ===== */
        .stats-bar {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: var(--glass);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
        }

        .stat-item {
            padding: 2.5rem 2rem;
            text-align: center;
            border-right: 1px solid var(--glass-border);
            transition: background 0.3s;
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-item:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }

        /* ===== 通用Section样式 ===== */
        section {
            position: relative;
            z-index: 1;
            padding: 8rem 3rem;
        }

        .section-header {
            text-align: center;
            margin-bottom: 5rem;
        }

        .section-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--primary);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: block;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .section-desc {
            color: rgba(255,255,255,0.5);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
            font-weight: 300;
        }

        /* ===== 特色功能 ===== */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(0, 212, 255, 0.1);
        }

        .feature-card:hover::before {
            opacity: 1;
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(123, 47, 255, 0.1));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            transition: all 0.4s;
        }

        .feature-card:hover .feature-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            transform: scale(1.1);
        }

        .feature-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .feature-card p {
            color: rgba(255,255,255,0.5);
            line-height: 1.8;
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* ===== 航线展示 ===== */
        .routes-section {
            background: linear-gradient(180deg, var(--darker) 0%, rgba(0, 20, 60, 0.3) 50%, var(--darker) 100%);
        }

        .routes-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .route-globe {
            width: 100%;
            height: 500px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .globe-visual {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(0, 102, 255, 0.3), rgba(0, 20, 60, 0.8));
            border: 2px solid rgba(0, 212, 255, 0.2);
            position: relative;
            animation: rotateGlobe 20s linear infinite;
            box-shadow: 0 0 60px rgba(0, 102, 255, 0.2), inset 0 0 60px rgba(0, 102, 255, 0.1);
        }

        @keyframes rotateGlobe {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

            border:
